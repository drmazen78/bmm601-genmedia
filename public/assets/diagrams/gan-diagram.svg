<?xml version="1.0" encoding="UTF-8"?>
<!-- GAN Diagram: Generator vs Discriminator -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" font-family="Inter, Arial, sans-serif">

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A8A">GAN: Generator vs Discriminator</text>

  <!-- ===== Random noise input ===== -->
  <g>
    <rect x="40" y="80" width="120" height="70" rx="6" fill="#9ca3af"/>
    <!-- noise dots -->
    <g opacity="0.95">
      <circle cx="60" cy="100" r="1.5" fill="#F8F9FA"/>
      <circle cx="80" cy="110" r="1.5" fill="#F8F9FA"/>
      <circle cx="100" cy="95" r="1.5" fill="#F8F9FA"/>
      <circle cx="120" cy="115" r="1.5" fill="#F8F9FA"/>
      <circle cx="140" cy="100" r="1.5" fill="#F8F9FA"/>
      <circle cx="70" cy="125" r="1.5" fill="#F8F9FA"/>
      <circle cx="90" cy="135" r="1.5" fill="#F8F9FA"/>
      <circle cx="110" cy="125" r="1.5" fill="#F8F9FA"/>
      <circle cx="130" cy="135" r="1.5" fill="#F8F9FA"/>
      <circle cx="150" cy="125" r="1.5" fill="#F8F9FA"/>
      <circle cx="55" cy="115" r="1.5" fill="#F8F9FA"/>
      <circle cx="135" cy="115" r="1.5" fill="#F8F9FA"/>
    </g>
    <text x="100" y="170" text-anchor="middle" font-size="11" fill="#212529">random noise</text>
  </g>

  <!-- Generator -->
  <g>
    <rect x="220" y="75" width="160" height="80" rx="8" fill="#1E3A8A" stroke="#1E3A8A" stroke-width="2"/>
    <text x="300" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#F8F9FA">Generator</text>
    <text x="300" y="128" text-anchor="middle" font-size="11" fill="#F8F9FA" font-style="italic">"the forger"</text>
    <text x="300" y="170" text-anchor="middle" font-size="11" fill="#212529">tries to make</text>
    <text x="300" y="184" text-anchor="middle" font-size="11" fill="#212529">a fake that looks real</text>
  </g>

  <!-- Generated fake -->
  <g>
    <rect x="440" y="80" width="100" height="70" rx="6" fill="#5b6db8"/>
    <circle cx="490" cy="115" r="14" fill="#F8F9FA" opacity="0.8"/>
    <text x="490" y="170" text-anchor="middle" font-size="11" fill="#212529">fake image</text>
  </g>

  <!-- Real image (from training set) -->
  <g>
    <rect x="440" y="220" width="100" height="70" rx="6" fill="#1E3A8A"/>
    <circle cx="490" cy="255" r="14" fill="#F8F9FA"/>
    <text x="490" y="310" text-anchor="middle" font-size="11" fill="#212529">real image</text>
    <text x="490" y="324" text-anchor="middle" font-size="10" fill="#6B7280">(from training set)</text>
  </g>

  <!-- Discriminator -->
  <g>
    <rect x="600" y="135" width="160" height="100" rx="8" fill="#F59E0B" stroke="#F59E0B" stroke-width="2"/>
    <text x="680" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Discriminator</text>
    <text x="680" y="190" text-anchor="middle" font-size="11" fill="#FFFFFF" font-style="italic">"the inspector"</text>
    <text x="680" y="215" text-anchor="middle" font-size="11" fill="#FFFFFF">real or fake?</text>
  </g>

  <!-- Arrows -->
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <marker id="arr3orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <g stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arr3)">
    <!-- noise -> generator -->
    <line x1="165" y1="115" x2="215" y2="115"/>
    <!-- generator -> fake image -->
    <line x1="385" y1="115" x2="435" y2="115"/>
    <!-- fake image -> discriminator -->
    <path d="M 545 115 Q 580 125 595 160"/>
    <!-- real image -> discriminator -->
    <path d="M 545 255 Q 580 245 595 215"/>
  </g>

  <!-- Feedback loop: discriminator -> generator (orange, dashed, going back) -->
  <g stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arr3orange)" stroke-dasharray="5,4">
    <path d="M 600 195 Q 400 340 305 160"/>
  </g>
  <text x="400" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">feedback: did the inspector get fooled?</text>

  <!-- Caption at bottom -->
  <text x="400" y="365" text-anchor="middle" font-size="11" font-style="italic" fill="#6B7280">
    Two networks compete: one makes fakes, the other catches them. Both improve over time.
  </text>
</svg>
